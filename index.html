<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do-list</title>
     <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
      <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info py-3 fixed-top">
        <a class="navbar-brand" href="#"><strong>to-do-list</strong></a> 
    </nav>

   <div class="container " style="margin-top: 140px;">
    <div class="row justify-content-center">

        <div class="col-lg-12">

            <div class="card shadow-lg border-0 mb-5">
                <div class="card-body p-5">

                    <h2 class="text-center mb-2">Manage Your Tasks</h2>

                  

                    <form>

                        <label for="task" class="d-block mb-2">
                            <strong>Enter Task</strong>
                        </label>

                        <div class="row">

                            <div class="col-md-10 mb-2">
                                <input
                                    type="text"
                                    class="form-control"
                                    id="task"
                                    placeholder="Enter your task"
                                    required>
                            </div>

                            <div class="col-md-2">
                                <button
                                    type="button"
                                    class="btn btn-primary btn-block"
                                       id="addTaskBtn">
                                    Add Task
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>
</div>

 <div class="container">
    <h2 class="text-center mb-4">
        <strong>Your Tasks</strong>
    </h2>

   <div class="card shadow border-0">
    <div class="card-body p-4" id="taskList">
        <p class="text-center text-muted" id="emptyMessage">
    No tasks available. Add your first task!
</p>
        </div>
    </div>
</div>
<script src="main.js"></script>
<footer class="footer mt-5 fixed-bottom">
    <div class="container text-center py-3">
        <h5 class="mb-2">To-Do List</h5>
        <p class="mb-1">
            A simple To-Do List built using HTML, CSS, Bootstrap & JavaScript.
        </p>
        <small>
            © 2026 To-Do List | Developed by Harshvardhan Shisode
        </small>
    </div>
</footer>
</body>
</html>
